<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crop Recommendation System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f7fafc;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .navbar-brand {
        font-weight: bold;
        font-size: 1.4rem;
      }

      h1 {
        font-size: 2rem;
        color: #2f855a;
        text-align: center;
        margin-bottom: 1rem;
      }

      .form-section {
        background: white;
        border-radius: 15px;
        padding: 2rem;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        max-width: 800px;
        margin: 2rem auto;
      }

      label {
        font-weight: 600;
      }

      .btn-submit {
        background-color: #2f855a;
        border: none;
      }

      .btn-submit:hover {
        background-color: #276749;
      }

      .card-result {
        background-color: #2d3748;
        color: #fff;
        margin: 2rem auto;
        padding: 1.5rem;
        border-radius: 12px;
        max-width: 400px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">🌾 Crop Recommendation</a>
      </div>
    </nav>

    <!-- Main Form Section -->
    <div class="form-section">
      <h1>Smart Crop Recommendation 🌱</h1>
      <form action="/predict" method="POST">
        <div class="row g-3">
          <div class="col-md-4">
            <label for="Nitrogen">Nitrogen</label>
            <input
              type="number"
              id="Nitrogen"
              name="Nitrogen"
              class="form-control"
              placeholder="e.g. 90"
              required
              step="0.01"
            />
          </div>
          <div class="col-md-4">
            <label for="Phosporus">Phosphorus</label>
            <input
              type="number"
              id="Phosporus"
              name="Phosporus"
              class="form-control"
              placeholder="e.g. 40"
              required
              step="0.01"
            />
          </div>
          <div class="col-md-4">
            <label for="Potassium">Potassium</label>
            <input
              type="number"
              id="Potassium"
              name="Potassium"
              class="form-control"
              placeholder="e.g. 40"
              required
              step="0.01"
            />
          </div>

          <div class="col-md-4">
            <label for="Temperature">Temperature (°C)</label>
            <input
              type="number"
              id="Temperature"
              name="Temperature"
              class="form-control"
              placeholder="e.g. 22.5"
              required
              step="0.01"
            />
          </div>
          <div class="col-md-4">
            <label for="Humidity">Humidity (%)</label>
            <input
              type="number"
              id="Humidity"
              name="Humidity"
              class="form-control"
              placeholder="e.g. 80.0"
              required
              step="0.01"
            />
          </div>
          <div class="col-md-4">
            <label for="Ph">pH Level</label>
            <input
              type="number"
              id="Ph"
              name="Ph"
              class="form-control"
              placeholder="e.g. 6.5"
              required
              step="0.01"
            />
          </div>

          <div class="col-md-6">
            <label for="Rainfall">Rainfall (mm)</label>
            <input
              type="number"
              id="Rainfall"
              name="Rainfall"
              class="form-control"
              placeholder="e.g. 120.0"
              required
              step="0.01"
            />
          </div>

          <div class="col-md-12 d-flex justify-content-center mt-4">
            <button type="submit" class="btn btn-submit btn-lg px-5">
              Get Recommendation
            </button>
          </div>
        </div>
      </form>
    </div>

    <!-- Result Section -->
    {% if result %}
    <div class="card-result">
      <h4>🌾 Recommended Crop:</h4>
      <p class="fs-4 fw-bold">{{ result }}</p>
    </div>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
